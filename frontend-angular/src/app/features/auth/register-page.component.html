<section class="auth-page">
  <div class="auth-card">
    <h1>Register</h1>

    @if (message()) {
      <p [class.error]="isError()" [class.success]="!isError()">
        {{ message() }}
      </p>
    }

    <form (ngSubmit)="submit()">
      <label for="name">First name</label>
      <input
        id="name"
        name="name"
        type="text"
        [(ngModel)]="name"
        required
        autocomplete="given-name"
      />

      <label for="surname">Last name</label>
      <input
        id="surname"
        name="surname"
        type="text"
        [(ngModel)]="surname"
        required
        autocomplete="family-name"
      />

      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [(ngModel)]="username"
        required
        autocomplete="username"
      />

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        autocomplete="email"
      />

      <label for="role">Role</label>
      <select id="role" name="role" [(ngModel)]="role" required>
        <option value="participant_pilot">Participant pilot</option>
        <option value="participant_copilot">Participant copilot</option>
      </select>

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        [type]="showPassword() ? 'text' : 'password'"
        [(ngModel)]="password"
        required
        minlength="6"
        autocomplete="new-password"
      />

      <button type="button" (click)="togglePassword()">
        {{ showPassword() ? 'Hide password' : 'Show password' }}
      </button>

      <label for="confirmPassword">Confirm password</label>
      <input
        id="confirmPassword"
        name="confirmPassword"
        [type]="showConfirmPassword() ? 'text' : 'password'"
        [(ngModel)]="confirmPassword"
        required
        minlength="6"
        autocomplete="new-password"
      />

      <button type="button" (click)="toggleConfirmPassword()">
        {{ showConfirmPassword() ? 'Hide confirmation' : 'Show confirmation' }}
      </button>

      <button type="submit">
        Create account
      </button>
    </form>

    <p>
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>
