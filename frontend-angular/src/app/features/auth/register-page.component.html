<section class="auth-page">
  <div class="auth-card">
    <h1>Register</h1>

    @if (message()) {
      <p class="auth-message" [class.is-error]="isError()">{{ message() }}</p>
    }

    <form (ngSubmit)="submit()">
      <label for="name">First name</label>
      <input
        id="name"
        name="name"
        type="text"
        [(ngModel)]="name"
        required
        autocomplete="given-name"
      />

      <label for="surname">Last name</label>
      <input
        id="surname"
        name="surname"
        type="text"
        [(ngModel)]="surname"
        required
        autocomplete="family-name"
      />

      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [(ngModel)]="username"
        required
        autocomplete="username"
      />

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        autocomplete="email"
      />

      <div class="field">
        <label for="role">Role</label>
        <div class="role-select-row">
          <select id="role" name="role" [(ngModel)]="role" required class="form-select">
            <option value="participant_pilot" title="Can create teams and register the team in tournaments.">Racer (Pilot)</option>
            <option value="participant_copilot" title="Can join teams." >Racer (Co-pilot)</option>
            <option value="tournament_admin" title="Can create and manage tournaments.">Tournament Administrator</option>
          </select>
          <span
            class="role-help"
            tabindex="0"
            aria-label="Role help"
            data-tooltip="Select a role to see its permissions below."
          >?</span>
        </div>
        <p class="role-description">{{ selectedRoleDescription() }}</p>
      </div>

      <label for="password">Password</label>
      <div class="password-field">
        <input
          id="password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          required
          minlength="6"
          autocomplete="new-password"
        />
        <button type="button" class="password-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
          @if (showPassword()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3l18 18m-9-4c-3.2 0-6.1-1.8-8.5-5 1.1-1.4 2.2-2.5 3.5-3.4m3-1.1c.6-.1 1.3-.2 2-.2 3.2 0 6.1 1.8 8.5 5-.8 1-1.5 1.9-2.4 2.6M12 9a3 3 0 013 3" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Zm10-3.5A3.5 3.5 0 1015.5 12 3.5 3.5 0 0012 8.5Z" />
            </svg>
          }
        </button>
      </div>

      <label for="confirmPassword">Confirm password</label>
      <div class="password-field">
        <input
          id="confirmPassword"
          name="confirmPassword"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          required
          minlength="6"
          autocomplete="new-password"
        />
        <button type="button" class="password-toggle" (click)="toggleConfirmPassword()" [attr.aria-label]="showConfirmPassword() ? 'Hide confirmation' : 'Show confirmation'">
          @if (showConfirmPassword()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3l18 18m-9-4c-3.2 0-6.1-1.8-8.5-5 1.1-1.4 2.2-2.5 3.5-3.4m3-1.1c.6-.1 1.3-.2 2-.2 3.2 0 6.1 1.8 8.5 5-.8 1-1.5 1.9-2.4 2.6M12 9a3 3 0 013 3" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Zm10-3.5A3.5 3.5 0 1015.5 12 3.5 3.5 0 0012 8.5Z" />
            </svg>
          }
        </button>
      </div>

      <button type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p>
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>

@if (showSuccessDialog()) {
  <div class="auth-dialog-backdrop" (click)="continueAfterSuccess()">
    <section class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="register-success-title" (click)="$event.stopPropagation()">
      <div class="auth-dialog-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M5 12.5l4.2 4.2L19 7.5" />
        </svg>
      </div>
      <h2 id="register-success-title">Register successful</h2>
      <p>Your account is ready.</p>
      <button type="button" class="auth-dialog-primary" (click)="continueAfterSuccess()">Continue</button>
    </section>
  </div>
}
