<main class="auth-page">
  <section class="auth-card" aria-labelledby="register-title">
    <h1 id="register-title">Register</h1>

    @if (message()) {
      <p class="auth-message" [class.is-error]="isError()">{{ message() }}</p>
    }

    <form (ngSubmit)="submit()">
      <label for="register-first-name">First name</label>
      <input id="register-first-name" name="firstName" type="text" [(ngModel)]="firstName" autocomplete="given-name" required />

      <label for="register-last-name">Last name</label>
      <input id="register-last-name" name="lastName" type="text" [(ngModel)]="lastName" autocomplete="family-name" required />

      <label for="register-username">Username</label>
      <input id="register-username" name="username" type="text" [(ngModel)]="username" autocomplete="username" required />

      <label for="register-email">Email</label>
      <input id="register-email" name="email" type="email" [(ngModel)]="email" autocomplete="email" required />

      <label for="register-role">Role</label>
      <select id="register-role" name="role" [(ngModel)]="role" required>
        <option value="participant">Participant</option>
        <option value="tournament_admin">Tournament Admin</option>
      </select>

      <label for="register-password">Password</label>
      <div class="password-field">
        <input
          id="register-password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          autocomplete="new-password"
          required />
        <button type="button" class="password-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
          @if (showPassword()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3l18 18m-9-4c-3.2 0-6.1-1.8-8.5-5 1.1-1.4 2.2-2.5 3.5-3.4m3-1.1c.6-.1 1.3-.2 2-.2 3.2 0 6.1 1.8 8.5 5-.8 1-1.5 1.9-2.4 2.6M12 9a3 3 0 013 3" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Zm10-3.5A3.5 3.5 0 1015.5 12 3.5 3.5 0 0012 8.5Z" />
            </svg>
          }
        </button>
      </div>

      <label for="register-confirm-password">Confirm password</label>
      <div class="password-field">
        <input
          id="register-confirm-password"
          name="confirmPassword"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          autocomplete="new-password"
          required />
        <button type="button" class="password-toggle" (click)="toggleConfirmPassword()" [attr.aria-label]="showConfirmPassword() ? 'Hide confirm password' : 'Show confirm password'">
          @if (showConfirmPassword()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3l18 18m-9-4c-3.2 0-6.1-1.8-8.5-5 1.1-1.4 2.2-2.5 3.5-3.4m3-1.1c.6-.1 1.3-.2 2-.2 3.2 0 6.1 1.8 8.5 5-.8 1-1.5 1.9-2.4 2.6M12 9a3 3 0 013 3" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Zm10-3.5A3.5 3.5 0 1015.5 12 3.5 3.5 0 0012 8.5Z" />
            </svg>
          }
        </button>
      </div>

      <button type="submit">Create account</button>
    </form>

    <p class="auth-link-row">Already have an account? <a routerLink="/login">Login</a></p>
  </section>
</main>
