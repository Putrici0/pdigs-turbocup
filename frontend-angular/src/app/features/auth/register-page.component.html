<section class="auth-page">
  <div class="auth-card">
    <h1>Register</h1>

    @if (message()) {
      <p class="auth-message" [class.is-error]="isError()">{{ message() }}</p>
    }

    <form (ngSubmit)="submit()">
      <label for="name">First name</label>
      <input
        id="name"
        name="name"
        type="text"
        [(ngModel)]="name"
        required
        autocomplete="given-name"
      />

      <label for="surname">Last name</label>
      <input
        id="surname"
        name="surname"
        type="text"
        [(ngModel)]="surname"
        required
        autocomplete="family-name"
      />

      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        [(ngModel)]="username"
        required
        autocomplete="username"
      />

      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        required
        autocomplete="email"
      />

      <label class="field">
        <span>Role</span>
        <select name="role" [(ngModel)]="role" required class="form-select">
          <option value="participant_pilot" title="Can create teams and register the team in tournaments.">Racer (Pilot)</option>
          <option value="participant_copilot" title="Can join teams." >Racer (Co-pilot)</option>
          <option value="tournament_admin" title="Can create and manage tournaments.">Tournament Administrator</option>
        </select>
      </label>

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        [type]="showPassword() ? 'text' : 'password'"
        [(ngModel)]="password"
        required
        minlength="6"
        autocomplete="new-password"
      />

      <button type="button" (click)="togglePassword()">
        {{ showPassword() ? 'Hide password' : 'Show password' }}
      </button>

      <label for="confirmPassword">Confirm password</label>
      <input
        id="confirmPassword"
        name="confirmPassword"
        [type]="showConfirmPassword() ? 'text' : 'password'"
        [(ngModel)]="confirmPassword"
        required
        minlength="6"
        autocomplete="new-password"
      />

      <button type="button" (click)="toggleConfirmPassword()">
        {{ showConfirmPassword() ? 'Hide confirmation' : 'Show confirmation' }}
      </button>

      <button type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p>
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>

@if (showSuccessDialog()) {
  <div class="auth-dialog-backdrop" (click)="continueAfterSuccess()">
    <section class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="register-success-title" (click)="$event.stopPropagation()">
      <div class="auth-dialog-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M5 12.5l4.2 4.2L19 7.5" />
        </svg>
      </div>
      <h2 id="register-success-title">Register successful</h2>
      <p>Your account is ready.</p>
      <button type="button" class="auth-dialog-primary" (click)="continueAfterSuccess()">Continue</button>
    </section>
  </div>
}
