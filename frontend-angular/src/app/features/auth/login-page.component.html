<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <h1 id="login-title">Login</h1>
    <p class="form-hint">Demo: {{ authService.defaultCredentials.email }} / {{ authService.defaultCredentials.password }}</p>

    @if (message()) {
      <p class="auth-message" [class.is-error]="isError()">{{ message() }}</p>
    }

    <form (ngSubmit)="submit()">
      <label for="login-email">Email</label>
      <input id="login-email" name="email" type="email" [(ngModel)]="email" autocomplete="email" required />

      <label for="login-password">Password</label>
      <div class="password-field">
        <input
          id="login-password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          autocomplete="current-password"
          required />
        <button type="button" class="password-toggle" (click)="togglePassword()">
          {{ showPassword() ? 'Hide' : 'Show' }}
        </button>
      </div>

      <button type="submit">Sign in</button>
    </form>

    <p class="auth-link-row">Need an account? <a routerLink="/register">Register</a></p>
  </section>
</main>
