<main class="auth-page">
  <section class="auth-card" aria-labelledby="login-title">
    <h1 id="login-title">Login</h1>
    <p class="form-hint">Demo: {{ authService.defaultCredentials.email }} / {{ authService.defaultCredentials.password }}</p>

    @if (message()) {
      <p class="auth-message" [class.is-error]="isError()">{{ message() }}</p>
    }

    <form (ngSubmit)="submit()">
      <label for="login-email">Email</label>
      <input id="login-email" name="email" type="email" [(ngModel)]="email" autocomplete="email" required />

      <label for="login-password">Password</label>
      <div class="password-field">
        <input
          id="login-password"
          name="password"
          [type]="showPassword() ? 'text' : 'password'"
          [(ngModel)]="password"
          autocomplete="current-password"
          required />
        <button type="button" class="password-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
          @if (showPassword()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 3l18 18m-9-4c-3.2 0-6.1-1.8-8.5-5 1.1-1.4 2.2-2.5 3.5-3.4m3-1.1c.6-.1 1.3-.2 2-.2 3.2 0 6.1 1.8 8.5 5-.8 1-1.5 1.9-2.4 2.6M12 9a3 3 0 013 3" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Zm10-3.5A3.5 3.5 0 1015.5 12 3.5 3.5 0 0012 8.5Z" />
            </svg>
          }
        </button>
      </div>

      <button type="submit">Sign in</button>
    </form>

    <p class="auth-link-row">Need an account? <a routerLink="/register">Register</a></p>
  </section>
</main>
