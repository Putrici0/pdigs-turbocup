<section class="create-team-page">
  <p class="eyebrow">Team Management</p>
  <h1>Create Team</h1>
  <p class="intro">
    Create a new team using the available racing categories.
  </p>

  @if (errorMessage()) {
    <p class="notice is-error">{{ errorMessage() }}</p>
  }

  @if (successMessage()) {
    <p class="notice is-success">{{ successMessage() }}</p>
  }

  <form class="create-team-form" (ngSubmit)="submit()">
    <label>
      <span>Team name</span>
      <input
        type="text"
        name="teamName"
        [ngModel]="name()"
        (ngModelChange)="updateName($event)"
        required
      />
    </label>

    <label>
      <span>Category</span>
      <select
        name="category"
        [ngModel]="category()"
        (ngModelChange)="updateCategory($event)"
        required
      >
        @for (item of availableCategories(); track item) {
          <option [value]="item">{{ formatCategory(item) }}</option>
        }
      </select>
    </label>

    <button type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Creating team...' : 'Create team' }}
    </button>
  </form>
</section>
