<main class="page-shell">
  <section class="hero">
    <p class="eyebrow">Profile Settings</p>
    <h1>Edit profile</h1>
    <p class="hero-copy">Update your profile information and visible account details.</p>
  </section>

  <form class="panel profile-layout">
    <section class="panel profile-summary">
      <div class="avatar-block">
        <div class="avatar-preview" aria-hidden="true">{{ initials() }}</div>
        <div class="avatar-copy">
          <h2>Profile image</h2>
          <p>Choose an image that other users will see next to your name.</p>
        </div>
      </div>
      <div class="upload-actions">
        <label class="upload-button" for="profile-image">Choose image</label>
        <input id="profile-image" class="hidden-input" type="file" accept="image/*" />
        <button type="button" class="secondary-action">Remove image</button>
      </div>
    </section>

    <section class="form-section">
      <div class="section-copy">
        <h2>Public information</h2>
      </div>
      <div class="field-grid">
        <label class="field">
          <span>Profile name</span>
          <input type="text" name="profileName" [(ngModel)]="profileName" />
        </label>
        <label class="field">
          <span>Username</span>
          <input type="text" name="username" [(ngModel)]="username" />
        </label>
      </div>
      <label class="field full-width">
        <span>Bio</span>
        <textarea name="bio" rows="4" [(ngModel)]="bio"></textarea>
      </label>
    </section>

    <section class="form-section">
      <div class="section-copy">
        <h2>Account details</h2>
      </div>
      <div class="field-grid">
        <label class="field">
          <span>Email address</span>
          <input type="email" name="email" [(ngModel)]="email" />
        </label>
        <label class="field">
          <span>Location</span>
          <input type="text" name="location" [(ngModel)]="location" />
        </label>
        <label class="field">
          <span>Favorite team</span>
          <input type="text" name="favoriteTeam" [(ngModel)]="favoriteTeam" />
        </label>
        <label class="field">
          <span>Preferred role</span>
          <input type="text" name="preferredRole" [(ngModel)]="preferredRole" />
        </label>
      </div>
    </section>

    <div class="actions">
      <button type="submit" class="primary-action">Save changes</button>
      <button type="reset" class="secondary-action">Reset</button>
    </div>
  </form>
</main>
