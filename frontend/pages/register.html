<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/toolbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/form.css">
</head>
<body>
    <main class="form-page">
        <section class="form-card" aria-labelledby="register-title">
            <h1 id="register-title">Register</h1>
            <form action="#" method="post">
                <label for="register-first-name">First name</label>
                <input id="register-first-name" name="first_name" type="text" autocomplete="given-name" required>

                <label for="register-last-name">Last name</label>
                <input id="register-last-name" name="last_name" type="text" autocomplete="family-name" required>

                <label for="register-username">Username</label>
                <input id="register-username" name="username" type="text" autocomplete="username" required>

                <label for="register-email">Email</label>
                <input id="register-email" name="email" type="email" autocomplete="email" required>

                <label for="register-role">Role</label>
                <select id="register-role" name="role" required>
                    <option value="participant">Participant</option>
                    <option value="tournament_admin">Tournament Admin</option>
                </select>

                <label for="register-password">Password</label>
                <div class="password-field">
                    <input id="register-password" name="password" type="password" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" data-toggle-password="register-password" aria-label="Show password"></button>
                </div>

                <label for="register-confirm-password">Confirm password</label>
                <div class="password-field">
                    <input id="register-confirm-password" name="confirm_password" type="password" autocomplete="new-password" required>
                    <button type="button" class="password-toggle" data-toggle-password="register-confirm-password" aria-label="Show password"></button>
                </div>

                <button type="submit">Create account</button>
            </form>
        </section>
    </main>
    <script src="../js/auth.js" defer></script>
    <script src="../templates/layout_template.js" defer></script>
    <script src="../js/toolbar.js" defer></script>
    <script src="../js/register_page.js" defer></script>
</body>
</html>
