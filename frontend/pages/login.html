<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/toolbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/form.css">
</head>
<body>
    <main class="form-page">
        <section class="form-card" aria-labelledby="login-title">
            <h1 id="login-title">Login</h1>
            <p id="demoCredentials" class="form-hint"></p>
            <form action="#" method="post">
                <label for="login-email">Email</label>
                <input id="login-email" name="email" type="email" autocomplete="email" required>

                <label for="login-password">Password</label>
                <div class="password-field">
                    <input id="login-password" name="password" type="password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" data-toggle-password="login-password" aria-label="Show password"></button>
                </div>

                <button type="submit">Sign in</button>
            </form>
        </section>
    </main>
    <script src="../js/auth.js" defer></script>
    <script src="../templates/layout_template.js" defer></script>
    <script src="../js/toolbar.js" defer></script>
    <script src="../js/login_page.js" defer></script>
</body>
</html>
